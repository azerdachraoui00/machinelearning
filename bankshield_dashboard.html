::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div class="grid"></div>
<div class="app" id="root"></div>
<div id="toast"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API = "http://localhost:5000";

const QUICK_CVES = [
  { id:"CVE-2021-44228", label:"Log4Shell",      sev:"CRITICAL", score:10.0 },
  { id:"CVE-2022-22965", label:"Spring4Shell",   sev:"CRITICAL", score:9.8  },
  { id:"CVE-2021-41773", label:"Apache Path Trav",sev:"HIGH",    score:7.5  },
  { id:"CVE-2023-44487", label:"HTTP/2 Rapid",   sev:"HIGH",     score:7.5  },
  { id:"CVE-2024-3400",  label:"PAN-OS RCE",     sev:"CRITICAL", score:10.0 },
  { id:"CVE-2023-46604", label:"ActiveMQ RCE",   sev:"CRITICAL", score:10.0 },
];

function toast(msg, err=false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = err ? "err show" : "show";
  setTimeout(() => el.className = err ? "err" : "", 3200);
}

function ScoreBar({ score=0 }) {
  const c = score>=9?"var(--rd)":score>=7?"var(--or)":score>=4?"var(--yw)":"var(--ac2)";
  return <div className="score-b">
    <span style={{color:c,minWidth:26}}>{score.toFixed?score.toFixed(1):score}</span>
    <div className="st-"><div className="sf" style={{width:`${Math.min(score*10,100)}%`,background:c}}/></div>
  </div>;
}

function Status({ status }) {
  const m = {
    new:["st-new","NOUVEAU"], analyzing:["st-analyzing","ANALYSE"],
    dispatched:["st-dispatched","ENVOYÉ"], running:["st-running","EN COURS"],
    patched:["st-patched","CORRIGÉ"], failed:["st-failed","ÉCHEC"],
  };
  const [cls,lbl] = m[status]||["st-new",(status||"").toUpperCase()];
  return <div className={`st ${cls}`}><div className="sd"/><span>{lbl}</span></div>;
}

function App() {
  const [cves,    setCves]    = useState([]);
  const [jobs,    setJobs]    = useState([]);
  const [hosts,   setHosts]   = useState({});
  const [summary, setSummary] = useState({total:0,critical:0,high:0,medium:0,affected:0,patched:0});
  const [ctiKpis, setCtiKpis] = useState({mttd_hours:0,mttr_hours:0,kev_coverage_percent:0,enrichment_ratio_percent:0});
  const [compliance, setCompliance] = useState({});
  const [tab,     setTab]     = useState("ALL");
  const [sel,     setSel]     = useState(null);
  const [apiOk,   setApiOk]   = useState(null);
  const [testOpen,setTestOpen]= useState(false);

  const [cveInput, setCveInput] = useState("");
  const [force,    setForce]    = useState(false);
  const [injecting,setInjecting]= useState(false);
  const [injectResult, setInjectResult] = useState(null);
  const [testLogs, setTestLogs] = useState([]);
  const [batchInput, setBatchInput] = useState("");
  const [batching,   setBatching]   = useState(false);
  const [batchResult,setBatchResult]= useState(null);
  const logRef = useRef(null);

  const fetchAll = useCallback(async () => {
    try {
      const [rw, rj, rh, rl, rk, rc] = await Promise.all([
        fetch(`${API}/api/warn`),
        fetch(`${API}/api/jobs`),
        fetch(`${API}/api/hosts`),
        fetch(`${API}/api/test/log`),
        fetch(`${API}/api/cti/kpis`),
        fetch(`${API}/api/compliance`),
      ]);
      if (rw.ok) { const d=await rw.json(); if(d.ok){setCves(d.cves||[]);setSummary(d.summary||{});setApiOk(true);}}
      if (rj.ok) { const d=await rj.json(); if(d.ok) setJobs(d.jobs||[]);}
      if (rh.ok) { const d=await rh.json(); if(d.ok) setHosts(d.hosts||{});}
      if (rl.ok) { const d=await rl.json(); if(d.ok) setTestLogs(d.log||[]);}
      if (rk.ok) { const d=await rk.json(); if(d.ok) setCtiKpis(d.kpis||{});}
      if (rc.ok) { const d=await rc.json(); if(d.ok) setCompliance(d.compliance||{});}
    } catch { setApiOk(false); }
  }, []);

  useEffect(() => {
    fetchAll();
    const iv = setInterval(fetchAll, 4000);
    return () => clearInterval(iv);
  }, [fetchAll]);

  useEffect(() => { if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; }, [testLogs]);

  const doInject = useCallback(async () => {
    const cid = cveInput.trim().toUpperCase();
    if (!cid) { toast("Entrez un CVE ID", true); return; }
    setInjecting(true);
    setInjectResult(null);
    try {
      const r = await fetch(`${API}/api/import/cve`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ cve_id: cid, force }),
      });
      const d = await r.json();
      setInjectResult(d);
      if (d.ok) {
        toast(`✓ ${cid} importé — BSRS: ${d.result?.bsrs_avg || '?'}`);
        setTimeout(fetchAll, 1000);
      } else {
        toast(d.error || "Import échoué", true);
      }
    } catch(e) {
      setInjectResult({ ok:false, error: e.message });
      toast("Erreur réseau", true);
    }
    setInjecting(false);
  }, [cveInput, force, fetchAll]);

  const doBatch = useCallback(async () => {
    const ids = batchInput.split(/[\n,\s]+/).map(s=>s.trim().toUpperCase()).filter(s=>s.startsWith("CVE-"));
    if (!ids.length) { toast("Aucun CVE valide", true); return; }
    if (ids.length > 20) { toast("Maximum 20 CVE", true); return; }
    setBatching(true); setBatchResult(null);
    try {
      const r = await fetch(`${API}/api/import/batch`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ cve_ids: ids }),
      });
      const d = await r.json();
      setBatchResult(d);
      if (d.ok) { toast(`Batch: ${Object.keys(d.results||{}).length} importés`); setTimeout(fetchAll, 1500); }
    } catch(e) { toast("Batch échoué: "+e.message, true); }
    setBatching(false);
  }, [batchInput, fetchAll]);

  const triggerFix = useCallback(async (cveId) => {
    const r = await fetch(`${API}/api/auto_fix`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({cve_id:cveId}),
    });
    const d = await r.json();
    if (d.ok) { 
      toast(`Jobs lancés pour ${cveId}`); 
      setSel(null); 
      fetchAll();
      const interval = setInterval(fetchAll, 2000);
      setTimeout(() => clearInterval(interval), 60000);
    }
  }, [fetchAll]);

  const visible = cves.filter(c => {
    if (tab==="CRITICAL") return c.severity==="CRITICAL";
    if (tab==="HIGH")     return c.severity==="HIGH";
    if (tab==="AFFECTED") return c.affected_hosts?.length>0;
    if (tab==="PATCHED")  return c.status==="patched";
    if (tab==="INJECTED") return c.inject_source?.startsWith("MANUAL") || c.inject_source?.startsWith("TEST");
    return true;
  });

  const selCve = sel ? cves.find(c=>c.id===sel) : null;
  const injectedCount = cves.filter(c=>c.inject_source?.startsWith("MANUAL") || c.inject_source?.startsWith("TEST")).length;

  const getBsrsPriority = (cve) => {
    if (cve.affected_details && cve.affected_details.length) {
      const avg = cve.affected_details.reduce((s,d)=>s+d.bsrs,0)/cve.affected_details.length;
      const prio = cve.affected_details[0].priority;
      return { bsrs: avg.toFixed(1), priority: prio };
    }
    return { bsrs: '—', priority: '' };
  };

  return (
    <>
    <div className="bar">
      <div className="logo"><div className="hex">⬡</div>BANKSHIELD CTI v2.0</div>
      <div className="bar-pills">
        <div className={`pill ${apiOk===null?"p-nvd":apiOk?"p-live":"p-err"}`}>
          <div className="blink"/>{apiOk===null?"INIT...":apiOk?"FLASK OK":"OFFLINE"}
        </div>
        <div className="pill p-nvd"><div className="blink" style={{background:"var(--ac)"}}/>MISP+NVD+KEV+EPSS+MITRE</div>
        <div className={`pill p-test ${testOpen?"on":""}`} onClick={()=>setTestOpen(o=>!o)}>
          📥 IMPORT CVE {testOpen?"▶":"◀"}
        </div>
      </div>
      <div className="clock">{new Date().toLocaleTimeString("fr-FR",{hour12:false})}</div>
    </div>

    <div className="body">
      <aside className="sidebar">
        <div className="sl">Filtres</div>
        {[
          ["⬡","Tous","ALL",cves.length,"nb-b"],
          ["🔴","Critiques","CRITICAL",summary.critical,"nb-r"],
          ["🟠","Hautes","HIGH",summary.high,"nb-r"],
          ["🎯","Infra affectée","AFFECTED",summary.affected,"nb-r"],
          ["🧪","Importés","INJECTED",injectedCount,"nb-p"],
          ["✅","Corrigés","PATCHED",summary.patched,"nb-g"],
        ].map(([ic,lbl,f,cnt,bc])=>(
          <div key={f} className={`nav ${tab===f?"on":""}`} onClick={()=>setTab(f)}>
            <span>{ic}</span>{lbl}
            {cnt>0&&<span className={`nbadge ${bc}`}>{cnt}</span>}
          </div>
        ))}
        <div className="sl" style={{marginTop:8}}>Hosts surveillés</div>
        {Object.entries(hosts).map(([id,h])=>(
          <div key={id} className="host" title={`${h.host} — ${h.os}`}>
            <div className={`hd hd-${h.status==="critical"?"c":h.status==="warning"?"w":"ok"}`}/>
            <div className="hname">{h.name?.split(" ").slice(0,3).join(" ")}</div>
            {h.cve_count>0&&<div className="hcnt">{h.cve_count}</div>}
          </div>
        ))}
      </aside>

      <div className="content">
        <div className="kpis">
          {[
            ["k-total","Total CVE",cves.length,"MISP+NVD"],
            ["k-crit","Critiques",summary.critical,"score ≥ 9.0"],
            ["k-high","Hautes",summary.high,"score ≥ 7.0"],
            ["k-med","Moyennes",summary.medium,"score ≥ 4.0"],
            ["k-aff","Hosts affectés",summary.affected,"CPE match"],
            ["k-fix","Corrigés auto",summary.patched,"via agent"],
          ].map(([cls,lbl,val,sub])=>(
            <div key={cls} className={`kpi ${cls}`}>
              <div className="kl">{lbl}</div>
              <div className="kv">{val??0}</div>
              <div className="ks">{sub}</div>
            </div>
          ))}
        </div>
        <div className="kpis-cti">
          <div className="kpi-cti"><div className="kl">MTTD (heures)</div><div className="kv">{ctiKpis.mttd_hours}</div><div className="ks">détection</div></div>
          <div className="kpi-cti"><div className="kl">MTTR (heures)</div><div className="kv">{ctiKpis.mttr_hours}</div><div className="ks">correction</div></div>
          <div className="kpi-cti"><div className="kl">KEV coverage</div><div className="kv">{ctiKpis.kev_coverage_percent}%</div><div className="ks">CVE KEV détectés</div></div>
          <div className="kpi-cti"><div className="kl">Enrichment ratio</div><div className="kv">{ctiKpis.enrichment_ratio_percent}%</div><div className="ks">≥3 sources</div></div>
        </div>
        <div className="compliance-section">
          <h2>🛡 Compliance Status</h2>
          {Object.keys(compliance).length === 0 ? (
            <p>⏳ Chargement...</p>
          ) : (
            <>
              <p><strong>🏛 DORA:</strong> {compliance.DORA?.status === 'active' ? '✅ ACTIVE' : '❌ INACTIVE'} - {compliance.DORA?.rule || ''}</p>
              <p><strong>📘 ISO 27001:</strong> {compliance.ISO_27001?.status === 'active' ? '✅ ACTIVE' : '❌ INACTIVE'} - {compliance.ISO_27001?.rule || ''}</p>
              <p><strong>💳 PCI DSS:</strong> {compliance.PCI_DSS?.status === 'active' ? '✅ ACTIVE' : '❌ INACTIVE'} - {compliance.PCI_DSS?.rule || ''}</p>
              <p><strong>🔐 SWIFT CSP:</strong> {compliance.SWIFT_CSP?.status === 'active' ? '✅ ACTIVE' : '❌ INACTIVE'} - {compliance.SWIFT_CSP?.rule || ''}</p>
            </>
          )}
        </div>

        <div className="main-grid">
          <div className="panel">
            <div className="ph">
              <div className="pt">◈ CVE FEED — {visible.length}</div>
              <div className="pctrl">
                {[["ALL","TOUS"],["CRITICAL","CRIT"],["HIGH","HIGH"],["AFFECTED","AFFECTÉS"],["INJECTED","IMPORTÉS"],["PATCHED","CORRIGÉ"]].map(([f,l])=>(
                  <button key={f} className={`btn btn-f ${tab===f?"on":""}`} onClick={()=>setTab(f)}>{l}</button>
                ))}
                <button className="btn btn-cti" onClick={fetchAll}>⟳ Rafraîchir</button>
              </div>
            </div>
            <div className="tbl-wrap">
              <table>
                <thead>
                  <tr>
                    <th>CVE ID</th><th>Sév.</th><th>Score</th><th>Priorité/BSRS</th><th>Hosts</th><th>Statut</th><th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.length===0&&(<tr><td colSpan={7} style={{padding:20,textAlign:"center",color:"var(--t3)",fontSize:9}}>Aucune donnée — utilisez le panel IMPORT CVE</td></tr>)}
                  {visible.map(c=>{
                    const {bsrs, priority} = getBsrsPriority(c);
                    return (
                    <tr key={c.id}
                      className={`tr ${c.status==="patched"?"done":""} ${c.inject_source?.startsWith("MANUAL")?"injected":""}`}
                      onClick={()=>setSel(c.id)}>
                      <td><span className="cid">{c.id}</span>
                        <span className={`src-badge ${c.inject_source?.startsWith("MANUAL")?"src-test":"src-poll"}`}>
                          {c.inject_source?.startsWith("MANUAL")?"IMPORT":"NVD"}
                        </span>
                      </td>
                      <td><span className={`sev s${c.severity}`}>{c.severity}</span></td>
                      <td><ScoreBar score={c.score||0}/></td>
                      <td><div style={{fontWeight:'bold', color: parseFloat(bsrs)>=80?'var(--rd)':parseFloat(bsrs)>=60?'var(--or)':'var(--t2)'}}>{bsrs}</div><div style={{fontSize:'7px'}}>{priority}</div></td>
                      <td>{c.affected_hosts?.length>0?c.affected_hosts.map(h=><span key={h} className="htag">⬡{h.replace("srv-","").replace("-01","")}</span>):<span className="htag htag-none">—</span>}</td>
                      <td><Status status={c.status}/></td>
                      <td onClick={e=>e.stopPropagation()}>
                        {c.status==="patched"?<button className="btn btn-done">✓</button>
                        :c.status==="dispatched"?<button className="btn btn-done" disabled>⏳ FIXING...</button>
                        :c.affected_hosts?.length>0?<button className="btn btn-g" onClick={()=>triggerFix(c.id)}>⚡ FIX</button>
                        :<button className="btn" onClick={()=>setSel(c.id)}>→</button>}
                      </td>
                    </tr>
                  )})}
                </tbody>
              </table>
            </div>
          </div>

          <div className="panel">
            <div className="ph"><div className="pt">⚙ JOBS AGENT</div><span style={{fontSize:8,color:"var(--t3)"}}>{jobs.length}</span></div>
            <div style={{overflowY:"auto",flex:1}}>
              {jobs.length===0&&<div style={{padding:16,textAlign:"center",fontSize:9,color:"var(--t3)"}}>Aucun job encore</div>}
              {jobs.map(j=>(
                <div key={j.job_id} className="job">
                  <div className="jh"><span><span className="jid">JOB-{j.job_id}</span><span className={`jsrc ${j.source?.startsWith("MANUAL")?"jsrc-test":"jsrc-manual"}`}>{j.source||"NVD"}</span></span><Status status={j.status}/></div>
                  <div className="jcve">{j.cve_id}</div><div className="jhost">{j.host_name} · {j.host_ip}</div>
                  {j.log?.length>0&&<div className="jlog">{j.log.slice(-4).join("\n")}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>

    {/* PANEL IMPORT */}
    <div className={`test-panel ${testOpen?"open":""}`}>
      <div className="tp-hdr"><div className="tp-title">📥 IMPORT CVE (MISP → NVD + enrichissement)</div><button className="btn" onClick={()=>setTestOpen(false)}>✕</button></div>
      <div className="tp-body">
        <div className="inj-form">
          <div className="inj-title">◈ Import CVE unique (KEV+EPSS+MITRE+BSRS)</div>
          <div className="field"><label>CVE ID</label><input value={cveInput} onChange={e=>setCveInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doInject()} placeholder="CVE-2024-12345"/></div>
          <div className="toggle-row"><span>Force re‑import (écrase existant)</span>
            <label className="tgl"><input type="checkbox" checked={force} onChange={e=>setForce(e.target.checked)}/><div className="tgl-track"/><div className="tgl-thumb"/></label>
          </div>
          <button className={`inject-btn ${injecting?"loading":""}`} onClick={doInject} disabled={injecting}>
            {injecting ? "⟳  RÉCUPÉRATION MISP+NVD + ENRICHISSEMENT..." : "⚡  IMPORTER & ENRICHIR"}
          </button>
        </div>

        {injectResult && (
          <div className={`result-box ${injectResult.ok?"ok":"err"}`}>
            <div className="result-hdr">{injectResult.ok ? `✓ ${injectResult.cve_id} — BSRS: ${injectResult.result?.bsrs_avg||'?'}` : `✗ ${injectResult.error||"Erreur"}`}</div>
            <div className="result-body">
              {injectResult.ok && injectResult.result && (
                <>
                  <div className="step-row"><div className="step-icon">📊</div><div className="step-info"><div className="step-label">BankShield Risk Score</div><div className="step-detail">Moyen: {injectResult.result.bsrs_avg} · {injectResult.result.affected_details?.[0]?.priority || 'N/A'}</div></div></div>
                  <div className="step-row"><div className="step-icon">🔍</div><div className="step-info"><div className="step-label">Hosts affectés</div><div className="step-detail">{injectResult.result.affected_hosts?.join(', ') || 'Aucun'}</div></div></div>
                  <div className="step-row"><div className="step-icon">🧬</div><div className="step-info"><div className="step-label">Enrichissement</div><div className="step-detail">KEV: {injectResult.result.enrichment?.kev_status?'✅':'❌'} · EPSS: {(injectResult.result.enrichment?.epss_score*100).toFixed(1)}% · MITRE: {injectResult.result.enrichment?.mitre_techniques} techniques</div></div></div>
                </>
              )}
            </div>
          </div>
        )}

        <div><div style={{fontSize:8,letterSpacing:"1.5px",color:"var(--t3)",textTransform:"uppercase",marginBottom:7}}>CVE célèbres</div>
          <div className="quick-grid">{QUICK_CVES.map(q=>(<div key={q.id} className="quick-cve" onClick={()=>{ setCveInput(q.id); }}><div className="qid">{q.id}</div><div className="qsev"><span className={`sev s${q.sev}`}>{q.sev}</span><span style={{color:"var(--t3)",marginLeft:5}}>{q.score}</span></div><div style={{fontSize:7,color:"var(--t2)",marginTop:2}}>{q.label}</div></div>))}</div>
        </div>

        <div className="inj-form" style={{borderColor:"var(--ac3)"}}>
          <div className="inj-title" style={{color:"var(--ac)"}}>◈ Import batch (multi-CVE)</div>
          <div className="field"><label>CVE IDs (un par ligne ou séparés par virgule)</label><textarea className="batch-area" value={batchInput} onChange={e=>setBatchInput(e.target.value)} placeholder={"CVE-2021-44228\nCVE-2022-22965"}/></div>
          <button className={`inject-btn ${batching?"loading":""}`} onClick={doBatch} disabled={batching} style={{background:"linear-gradient(135deg,var(--ac3),var(--ac2))"}}>{batching?"⟳  BATCH EN COURS...":"⚡  IMPORTER BATCH"}</button>
          {batchResult && (<div style={{marginTop:10,padding:9,background:"var(--bg4)",borderRadius:3,fontSize:9}}><div style={{color:Object.keys(batchResult.results||{}).length>0?"var(--gr)":"var(--rd)",marginBottom:5}}>Batch: {Object.keys(batchResult.results||{}).length} OK · {Object.keys(batchResult.errors||{}).length} erreurs</div></div>)}
        </div>

        <div className="tlog"><div className="tlog-hdr"><span>PIPELINE LOG (CTI)</span><span>{testLogs.length} entrées</span></div><div className="tlog-body" ref={logRef}>{testLogs.length===0&&<div className="ll-d">En attente d'imports...</div>}{testLogs.map((l,i)=>(<div key={i} className={`ll-${l.level==="success"?"s":l.level==="error"?"e":l.level==="warn"?"w":"i"}`}><span style={{color:"var(--t4)",marginRight:6}}>{new Date(l.ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>{l.msg}</div>))}<div className="ll-i"><span className="cursor"/></div></div></div>
      </div>
    </div>

    {/* MODAL DÉTAIL AVEC MITRE ATT&CK TOUJOURS VISIBLE */}
    {selCve&&(
      <div className="ov open" onClick={()=>setSel(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="mh"><div className="mtit">{selCve.id}{selCve.inject_source?.startsWith("MANUAL")&&<span className="src-badge src-test" style={{marginLeft:8}}>IMPORT</span>}</div><button className="btn" onClick={()=>setSel(null)}>✕</button></div>
          <div className="mb">
            {selCve.status==="patched"&&(<div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(0,148,72,.07)",border:"1px solid var(--gr2)",borderRadius:3,padding:"10px 13px",marginBottom:12,fontSize:9,color:"var(--gr)"}}>✅ Corrigé — {new Date(selCve.patched_at||Date.now()).toLocaleTimeString("fr-FR")}</div>)}
            <div className="dg">
              {[
                ["Sévérité",<span className={`sev s${selCve.severity}`}>{selCve.severity}</span>],
                ["CVSS",<span style={{fontSize:20,color:selCve.severity==="CRITICAL"?"var(--rd)":selCve.severity==="HIGH"?"var(--or)":"var(--yw)"}}>{selCve.score?.toFixed(1)}</span>],
                ["BSRS",<div><span style={{fontSize:20,fontWeight:'bold',color: (selCve.affected_details?.[0]?.bsrs||0)>=80?'var(--rd)': (selCve.affected_details?.[0]?.bsrs||0)>=60?'var(--or)':'var(--t2)'}}>{selCve.affected_details?.[0]?.bsrs?.toFixed(1)||'N/A'}</span><div style={{fontSize:9}}>Priorité: {selCve.affected_details?.[0]?.priority||'N/A'}</div></div>],
                ["CISA KEV",selCve.kev_status ? <span style={{color:"var(--rd)"}}>✅ Oui (ajouté {selCve.kev_date || '?'}){selCve.kev_ransomware==="Known" && <span style={{marginLeft:5}}>🔴 Ransomware connu</span>}</span> : <span style={{color:"var(--t3)"}}>❌ Non</span>],
                ["EPSS",<div>{(selCve.epss_score*100).toFixed(1)}% probabilité<br/><span style={{fontSize:7}}>percentile {(selCve.epss_percentile*100).toFixed(0)} · {selCve.epss_date ? `date ${selCve.epss_date}` : ''}</span></div>],
                ["Statut",<Status status={selCve.status}/>],
              ].map(([l,v],i)=>(<div key={i} className="di"><div className="dil">{l}</div><div style={{marginTop:3}}>{v}</div></div>))}
            </div>
            {/* MITRE ATT&CK - TOUJOURS AFFICHÉ, MÊME VIDE */}
            <div className="di" style={{marginBottom:12}}>
              <div className="dil">MITRE ATT&CK</div>
              <div style={{marginTop:5}}>
                {selCve.mitre_attck?.techniques?.length > 0 ? (
                  <div style={{marginBottom:6}}>
                    <span style={{color:"var(--t3)",fontSize:8}}>Techniques : </span>
                    {selCve.mitre_attck.techniques.map(t => <span key={t} className="mitre-chip">{t}</span>)}
                  </div>
                ) : (
                  <div style={{color:"var(--t3)",fontSize:8, marginBottom:6}}>Aucune technique MITRE référencée</div>
                )}
                {selCve.mitre_attck?.capec_ids?.length > 0 && (
                  <div>
                    <span style={{color:"var(--t3)",fontSize:8}}>CAPEC IDs : </span>
                    {selCve.mitre_attck.capec_ids.map(c => <span key={c} className="mitre-chip">{c}</span>)}
                  </div>
                )}
              </div>
            </div>
            <div className="di" style={{marginBottom:12}}><div className="dil">Hosts bancaires affectés</div><div style={{marginTop:5}}>{selCve.affected_hosts?.length>0?selCve.affected_hosts.map(h=>{const hi=hosts[h];return <span key={h} className="htag">⬡ {h} {hi?`(${hi.os?.split(" ")[0]})`:""}</span>;}):<span style={{fontSize:9,color:"var(--t3)"}}>Aucun host affecté</span>}</div></div>
            {selCve.cpes?.length>0&&(<div style={{marginBottom:12}}><div className="dil">CPE NVD ({selCve.cpes.length})</div><div style={{marginTop:5}}>{selCve.cpes.slice(0,6).map((c,i)=><span key={i} className="cpe">{c.slice(0,55)}</span>)}</div></div>)}
            <div className="desc">{selCve.description}</div>
            {selCve.references?.length>0&&(<div style={{marginBottom:12}}><div className="dil">Références</div>{selCve.references.map((r,i)=><a key={i} href={r} target="_blank" className="ref">{r}</a>)}</div>)}
            {selCve.affected_hosts?.length>0&&selCve.status!=="patched"&&(<div className="fix-ban"><div style={{fontSize:18}}>🛡</div><div><div style={{fontWeight:600,marginBottom:2,fontFamily:"var(--head)",fontSize:11}}>Correction automatique</div><div style={{fontSize:9,color:"var(--t2)"}}>Dispatch vers {selCve.affected_hosts.length} agent(s)</div></div><button className="fix-btn" onClick={()=>triggerFix(selCve.id)}>⚡ CORRIGER</button></div>)}
          </div>
        </div>
      </div>
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
